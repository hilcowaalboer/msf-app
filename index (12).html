.tab-btn{display:flex;align-items:center;gap:6px;padding:12px 16px;border:none;background:transparent;cursor:pointer;font-weight:600;font-size:13px;color:#6B7A99;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit}
.tab-btn.on{color:#1B3A6B;font-weight:800;border-bottom-color:#E8760A}
.bub-me{background:linear-gradient(135deg,#1B3A6B,#2A5298);color:#fff;padding:11px 15px;border-radius:16px 16px 4px 16px;font-size:14px;line-height:1.6}
.bub-oth{background:#fff;color:#1B2B4B;padding:11px 15px;border-radius:16px 16px 16px 4px;font-size:14px;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

var SB_KEY='sb_publishable_oW_N-yKcKNmPjulaYXygGw_qMPF1YSI';

// ── API ───────────────────────────────────────────────────────────────────
function sbHeaders(){
  return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
}
async function sbGet(table,q){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?'+(q||''),{headers:sbHeaders()});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:Object.assign({'Prefer':'return=representation'},sbHeaders()),body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table,id,data){
  await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify(data)});
}
async function sbDel(table,id){
  await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbHeaders()});
}

// ── TEAM ──────────────────────────────────────────────────────────────────
var TEAM=[
  {id:1,name:"Menno Boels",role:"Directeur",av:"MB",color:"#1B3A6B",pw:"msf-menno2026",admin:false,photo:null,email:"m.boels@meesterschildersfriesland.nl"},
  {id:2,name:"Arjen Huitenga",role:"Projectleider",av:"AH",color:"#E8760A",pw:"msf-arjen2026",admin:false,photo:null,email:"a.huitenga@meesterschildersfriesland.nl"},

var S={

// ── UTILS ─────────────────────────────────────────────────────────────────
function mb(id){return TEAM.find(function(t){return t.id===id;});}
function nowT(){return new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});}
function todayS(){return new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"2-digit"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value:"";}
function toast(msg){var el=g("toast");el.textContent=msg;el.style.display="block";clearTimeout(window._tt);window._tt=setTimeout(function(){el.style.display="none";},3000);}
function av(m,size){
  if(!m)return "";
  if(m.photo)return '<img src="'+esc(m.photo)+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>';
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+esc(m.color)+';font-size:'+Math.max(10,Math.round(size*0.33))+'px">'+esc(m.av)+'</div>';
}
function badge(status){
  var c={Actief:{bg:"#e8f5e9",fg:"#1e7e34",dot:"#27ae60"},Gepland:{bg:"#fff8e1",fg:"#856404",dot:"#f0a500"},Afgerond:{bg:"#e3f2fd",fg:"#1256a0",dot:"#2980b9"},Gearchiveerd:{bg:"#f3f4f6",fg:"#6b7280",dot:"#9ca3af"}}[status]||{bg:"#f3f4f6",fg:"#6b7280",dot:"#9ca3af"};
  return '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'"><span style="width:6px;height:6px;border-radius:50%;background:'+c.dot+';display:inline-block"></span>'+esc(status)+'</span>';
}
function bar(val){return '<div class="bar"><div class="bar-fill" style="width:'+val+'%;background:'+(val===100?"#27ae60":"linear-gradient(90deg,#e8760a,#f5a03a)")+'"></div></div>';}

// ── DATA ──────────────────────────────────────────────────────────────────
async function laadProjecten(){
  try{
    var data=await sbGet('projecten','order=aangemaakt_op.desc');
    S.projects=data.map(function(p){return{id:p.id,name:p.naam,address:p.adres||"",status:p.status||"Gepland",archived:p.gearchiveerd||false,progress:p.voortgang||0,start:p.start_datum||"",end:p.eind_datum||"",notes:p.notities||"",assignees:p.teamleden||[]};});
  }catch(e){console.error(e);}
}
async function laadBerichten(){
  if(!S.proj)return;
  try{
    var data=await sbGet('berichten','project_id=eq.'+S.proj.id+'&order=aangemaakt_op.asc');
    var nieuw=data.map(function(b){return{id:b.id,user:b.gebruiker_id,text:b.tekst||"",img:b.afbeelding||null,time:b.tijd||""};});
    if(JSON.stringify(nieuw)!==JSON.stringify(S.berichten)){S.berichten=nieuw;render();}
  }catch(e){}
}
async function laadTaken(){
  if(!S.proj)return;
  try{
    var data=await sbGet('taken','project_id=eq.'+S.proj.id+'&order=aangemaakt_op.asc');
    var nieuw=data.map(function(t){return{id:t.id,title:t.titel,done:t.afgerond||false,assignee:t.toegewezen_aan,deadline:t.deadline||null,notes:t.notities||null};});
    if(JSON.stringify(nieuw)!==JSON.stringify(S.taken)){S.taken=nieuw;render();}
  }catch(e){}
}
async function laadFotos(){
  if(!S.proj)return;
  try{
    var data=await sbGet('fotos','project_id=eq.'+S.proj.id+'&order=aangemaakt_op.asc');
    S.fotos=data.map(function(f){return{id:f.id,label:f.label,url:f.url,uploader:f.uploader_id,date:f.datum||""};});
  }catch(e){}
}
async function laadGchat(){
  try{
    var data=await sbGet('teamchat','order=aangemaakt_op.asc&limit=100');
    var nieuw=data.map(function(m){return{id:m.id,user:m.gebruiker_id,text:m.tekst||"",img:m.afbeelding||null,time:m.tijd||""};});
    if(JSON.stringify(nieuw)!==JSON.stringify(S.gchat)){S.gchat=nieuw;if(S.page==="gchat")render();}
  }catch(e){}
}

function startPolling(){
  stopPolling();
  S.pollId=setInterval(function(){
    var el=document.activeElement;
    if(el&&(el.tagName==="TEXTAREA"||el.tagName==="INPUT"))return;
    laadProjecten().then(function(){if(S.page==="dash")render();});
    if(S.proj){laadBerichten();laadTaken();}
  },5000);
  S.pollGcId=setInterval(function(){
    var el=document.activeElement;
    if(el&&(el.tagName==="TEXTAREA"||el.tagName==="INPUT"))return;
    laadGchat();
  },5000);
}
function stopPolling(){
  if(S.pollId)clearInterval(S.pollId);
  if(S.pollGcId)clearInterval(S.pollGcId);
}

// ── NOTIFICATIES ─────────────────────────────────────────────────────────
function addNotif(text){
  S.notifs.unshift({id:Date.now(),text:text,time:nowT(),read:false});
  if(S.notifs.length>20)S.notifs.pop();
}
function toggleNotifs(){S.showNotifs=!S.showNotifs;render();}
function markNotifsRead(){S.notifs.forEach(function(n){n.read=true;});S.showNotifs=false;render();}

var kaartFilter='alle';
var msfMap=null;
var msfMarkers=[];
var geocodeCache={};

var FRIESLAND_COORDS={
  "Leeuwarden":[53.2012,5.7999],
  "Sneek":[53.0326,5.6580],
  "Heerenveen":[52.9597,5.9186],
  "Bolsward":[53.0676,5.5285],
  "Drachten":[53.1127,6.0997],
  "Harlingen":[53.1742,5.4252],
  "Franeker":[53.1879,5.5434],
  "Joure":[52.9694,5.8054],
  "Dokkum":[53.3239,5.9986],
  "Emmeloord":[52.7178,5.7498]
};

function getCoords(address){
  if(!address)return null;
  for(var city in FRIESLAND_COORDS){
    if(address.toLowerCase().includes(city.toLowerCase()))return FRIESLAND_COORDS[city];
  }
  return[53.2012,5.7999];
}

function initKaart(){
  setTimeout(function(){
    var container=document.getElementById("msf-map");
    if(!container)return;
    if(msfMap){msfMap.remove();msfMap=null;}
    msfMap=L.map("msf-map",{zoomControl:true}).setView([53.1,5.85],9);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:18}).addTo(msfMap);
    msfMarkers=[];
    var projs=S.projects.filter(function(p){
      if(p.archived)return false;
      if(kaartFilter!=="alle"&&p.status!==kaartFilter)return false;
      return true;
    });
    projs.forEach(function(p){
      var coords=getCoords(p.address);
      if(!coords)return;
      var color={Actief:"#1B3A6B",Gepland:"#f0a500",Afgerond:"#27ae60"}[p.status]||"#9ca3af";
      var assigneeAvatars=(p.assignees||[]).slice(0,3).map(function(id){var m=mb(id);return m?m.av:"?";}).join(" ");
      var done=p.tasks?p.tasks.filter(function(t){return t.done;}).length:0;
      var total=p.tasks?p.tasks.length:0;
      var icon=L.divIcon({
        html:'<div style="background:'+color+';color:#fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer">'+p.progress+'%</div>',
        className:"",iconSize:[38,38],iconAnchor:[19,19],popupAnchor:[0,-20]
      });
      var popupHtml='<div style="font-family:Segoe UI,Arial,sans-serif;min-width:200px;padding:4px">'+
        '<div style="font-size:13px;font-weight:800;color:#1B2B4B;margin-bottom:4px">'+esc(p.name)+'</div>'+
        '<div style="font-size:11px;color:#6B7A99;margin-bottom:6px">📍 '+esc(p.address||"")+'</div>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
        '<span style="background:'+(p.status==="Actief"?"#e3f0fd":p.status==="Gepland"?"#fff8e1":"#e8f5e9")+';color:'+(p.status==="Actief"?"#1B3A6B":p.status==="Gepland"?"#856404":"#1e7e34")+';border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">'+p.status+'</span>'+
        '<span style="font-size:11px;color:#6B7A99">'+done+'/'+total+' taken</span>'+
        '</div>'+
        '<div style="background:#F2F4F8;border-radius:6px;height:6px;overflow:hidden;margin-bottom:6px"><div style="width:'+p.progress+'%;height:100%;background:'+color+'"></div></div>'+
        '<div style="font-size:11px;color:#6B7A99;margin-bottom:8px">'+esc(p.start||"")+(p.end?" t/m "+esc(p.end):"")+'</div>'+
        '<button onclick="window._openProj('+p.id+')" style="background:'+color+';color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%">Project openen →</button>'+
        '</div>';
      var marker=L.marker(coords,{icon:icon}).addTo(msfMap).bindPopup(popupHtml,{maxWidth:240});
      msfMarkers.push({id:p.id,marker:marker});
    });
    if(projs.length>0){
      var group=L.featureGroup(msfMarkers.map(function(x){return x.marker;}));
      msfMap.fitBounds(group.getBounds().pad(0.2));
    }
  },100);
}

window._openProj=function(id){
  var p=S.projects.find(function(x){return x.id===id;});
  if(p){S.proj=p;S.page="project";S.tab="chat";S.berichten=[];S.taken=[];S.fotos=[];render();laadBerichten();laadTaken();laadFotos();}

function focusProject(id){
  var found=msfMarkers.find(function(x){return x.id===id;});
  if(found){found.marker.openPopup();msfMap.setView(found.marker.getLatLng(),13,{animate:true});}
}

function analyseAI(input){
  var f=input.files[0];if(!f||!f.type.startsWith("image/"))return;
  var r=new FileReader();
  r.onload=function(e){
    var img=document.getElementById("ai-img");
    var preview=document.getElementById("ai-preview");
    var loading=document.getElementById("ai-loading");
    var loadingText=document.getElementById("ai-loading-text");
    if(img){img.src=e.target.result;preview.style.display="block";}

    var msgs=["Foto analyseren met AI...","Schade detecteren...","Takenpakket samenstellen..."];
    var i=0;
    var t=setInterval(function(){
      i++;
      if(loadingText&&i<msgs.length)loadingText.textContent=msgs[i];
      if(i>=msgs.length){
        clearInterval(t);
        // Kies willekeurig schadeType (in productie: echte AI API)
        var types=Object.keys(aiAnalysisTypes);
        var schadeType=types[Math.floor(Math.random()*types.length)];
        var analyse=aiAnalysisTypes[schadeType];
        toonAIResultaat(analyse,schadeType);
      }
    },900);
  };
  r.readAsDataURL(f);
  input.value="";
}

async function voegAItakenToe(){
  var cbs=document.querySelectorAll(".ai-task-cb:checked");
  if(cbs.length===0){toast("Selecteer minimaal één taak");return;}
  var added=0;
  for(var i=0;i<cbs.length;i++){
    var title=cbs[i].getAttribute("data-title");
    var ass=parseInt(cbs[i].getAttribute("data-assignee"))||S.user.id;
    try{
      await sbPost("taken",{project_id:S.proj.id,titel:title,afgerond:false,toegewezen_aan:ass});
      added++;
    }catch(e){}
  }
  await laadTaken();
  toast(added+" taken toegevoegd vanuit AI scan ✅");
  S.tab="taken";render();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function selLogin(id){S.loginSel=id;S.loginErr="";render();}
function togglePw(){var i=g("pw-in");var b=g("pw-eye");if(i){i.type=i.type==="password"?"text":"password";b.textContent=i.type==="password"?"👁️":"🙈";}}
function doLogin(){
  var id=S.loginSel;var u=mb(id);if(!u)return;
  var pw=gv("pw-in");
  if(pw===u.pw){S.user=u;S.loginSel=null;S.loginErr="";S.loading=true;render();
    laadProjecten().then(function(){S.loading=false;render();startPolling();laadGchat();});
  }else{S.loginErr="Onjuist wachtwoord.";render();}
}
function doLogout(){stopPolling();S.user=null;S.page="dash";S.proj=null;S.projects=[];render();}
function go(p){
  stopPolling();S.page=p;
  if(p==="gchat"){laadGchat().then(render);S.pollGcId=setInterval(laadGchat,3000);}
  else if(p==="kaart"){laadProjecten().then(function(){render();initKaart();});}
  else{startPolling();}
  render();
}
function setTab(t){S.tab=t;if(t==="fotos"&&S.proj)laadFotos().then(render);render();}
function doSearch(v){S.search=v;if(S.page!=="dash")S.page="dash";render();}
function toggleArch(){S.showArch=!S.showArch;render();}
function openModal(m){if(m==="editproj"&&S.proj)S.editProj=JSON.parse(JSON.stringify(S.proj));S.modal=m;render();}
function closeModal(){S.modal=null;S.editTask=null;S.editMem=null;S.editTpl=null;S.editProj=null;render();}
function showLightbox(url,label){S.lightboxUrl=url;S.lightboxLabel=label;S.modal="lightbox";render();}

async function openProj(id){
  S.proj=S.projects.find(function(p){return p.id===id;});
  S.page="project";S.tab="chat";S.berichten=[];S.taken=[];S.fotos=[];
  render();
  await Promise.all([laadBerichten(),laadTaken(),laadFotos()]);
  render();
}

function setProgress(v){
  if(!S.proj)return;
  S.proj.progress=parseInt(v);
  var pv=g("prog-val");if(pv)pv.textContent=v+"%";
  clearTimeout(window._progT);
  window._progT=setTimeout(function(){
    sbPatch('projecten',S.proj.id,{voortgang:parseInt(v)});
    S.projects.forEach(function(p){if(p.id===S.proj.id)p.progress=parseInt(v);});
  },500);
}

async function sendMsg(){
  var inp=g("chat-inp");if(!inp)return;
  var text=inp.value.trim();if(!text)return;
  inp.value="";
  try{
    await sbPost('berichten',{project_id:S.proj.id,gebruiker_id:S.user.id,tekst:text,tijd:nowT()});
    await laadBerichten();render();
  }catch(e){toast("Fout bij versturen");}
}
async function sendChatImg(input){
  var f=input.files[0];if(!f||!f.type.startsWith("image/"))return;
  var r=new FileReader();
  r.onload=async function(e){
    try{await sbPost('berichten',{project_id:S.proj.id,gebruiker_id:S.user.id,tekst:"",afbeelding:e.target.result,tijd:nowT()});await laadBerichten();render();}catch(ex){toast("Fout bij uploaden");}
  };r.readAsDataURL(f);input.value="";
}
async function sendGc(){
  var inp=g("gc-inp");if(!inp)return;
  var text=inp.value.trim();if(!text)return;
  inp.value="";
  try{await sbPost('teamchat',{gebruiker_id:S.user.id,tekst:text,tijd:nowT()});await laadGchat();render();}catch(e){toast("Fout bij versturen");}
}
async function sendGcImg(input){
  var f=input.files[0];if(!f||!f.type.startsWith("image/"))return;
  var r=new FileReader();
  r.onload=async function(e){
    try{await sbPost('teamchat',{gebruiker_id:S.user.id,tekst:"",afbeelding:e.target.result,tijd:nowT()});await laadGchat();render();}catch(ex){}
  };r.readAsDataURL(f);input.value="";
}

async function toggleTask(id,currentDone){
  try{await sbPatch('taken',id,{afgerond:!currentDone});await laadTaken();render();}catch(e){}
}
async function delTask(id){
  if(!confirm("Taak verwijderen?"))return;
  try{await sbDel('taken',id);await laadTaken();render();}catch(e){}
}
function openEditTask(id){S.editTask=JSON.parse(JSON.stringify(S.taken.find(function(t){return t.id===id;})||{}));S.modal="edittask";render();}
function setEditTaskDone(done){if(S.editTask){S.editTask.done=done;render();}}
async function addTaskFromModal(){
  var title=gv("nt-title").trim();if(!title)return;
  var ass=parseInt(gv("nt-ass"))||S.user.id;
  try{
    var deadline=gv("nt-deadline")||null;
    await sbPost('taken',{project_id:S.proj.id,titel:title,afgerond:false,toegewezen_aan:ass,notities:gv("nt-notes")||null});
    closeModal();await laadTaken();render();
    var assignee=mb(ass);
    var assName=assignee?assignee.name.split(" ")[0]:"teamlid";
    if(ass===S.user.id){
      toast("Taak aangemaakt ✅");addNotif("✅ Taak aangemaakt: "+title);
    } else {
      toast("Taak toegewezen aan "+assName+" ✅");addNotif("✅ Taak \""+title+"\" toegewezen aan "+assName);
    }
  }catch(e){toast("Fout bij aanmaken taak");}
}
async function saveEditTask(){
  var title=gv("et-title").trim();if(!title||!S.editTask)return;
  var ass=parseInt(gv("et-ass"))||S.user.id;
  var wasDone=S.editTask.done;
  try{
    var dl=gv('et-deadline')||null;
    await sbPatch('taken',S.editTask.id,{titel:title,toegewezen_aan:ass,afgerond:S.editTask.done,deadline:dl});
    closeModal();await laadTaken();render();
    if(S.editTask.done&&!wasDone){
      toast("Taak afgerond! 🎉");
    } else {
      var assignee=mb(ass);
      var assName=assignee?assignee.name.split(" ")[0]:"teamlid";
      toast("Taak bijgewerkt — toegewezen aan "+assName+" ✅");
    }
  }catch(e){toast("Fout bij opslaan");}
}

async function addPhoto(input){
  var f=input.files[0];if(!f||!f.type.startsWith("image/"))return;
  var label=window.prompt("Geef de foto een omschrijving:");if(!label)return;
  var r=new FileReader();
  r.onload=async function(e){
    try{
      await sbPost('fotos',{project_id:S.proj.id,label:label,url:e.target.result,uploader_id:S.user.id,datum:todayS()});
      await laadFotos();render();toast("Foto toegevoegd 📷");
    }catch(ex){toast("Fout bij uploaden foto");}
  };r.readAsDataURL(f);input.value="";
}

async function createProject(){
  var naam=gv("npl-name").trim();if(!naam)return;
  var tpl=gv("npl-tpl");
  try{
    var res=await sbPost('projecten',{naam:naam,adres:gv("npl-addr"),start_datum:gv("npl-start")||null,eind_datum:gv("npl-end")||null,notities:gv("npl-notes"),status:"Gepland",gearchiveerd:false,voortgang:0,teamleden:[S.user.id]});
    var newId=Array.isArray(res)?res[0].id:res.id;
    if(tpl&&TPLS[tpl]){
      for(var i=0;i<TPLS[tpl].length;i++){
        await sbPost('taken',{project_id:newId,titel:TPLS[tpl][i],afgerond:false,toegewezen_aan:S.user.id});
      }
    }
    closeModal();await laadProjecten();render();toast("Project aangemaakt 🎉");
  }catch(e){toast("Fout bij aanmaken project: "+e.message);}
}
async function saveEditProject(){
  if(!S.editProj)return;
  try{
    await sbPatch('projecten',S.editProj.id,{naam:gv("ep-name").trim()||S.editProj.name,adres:gv("ep-addr"),start_datum:gv("ep-start")||null,eind_datum:gv("ep-end")||null,status:gv("ep-status")||S.editProj.status,notities:gv("ep-notes")});
    closeModal();await laadProjecten();
    S.proj=S.projects.find(function(p){return p.id===S.editProj.id;})||S.proj;
    render();toast("Project opgeslagen ✅");
  }catch(e){toast("Fout bij opslaan");}
}
async function archProj(id,arc){
  try{
    await sbPatch('projecten',id,{gearchiveerd:arc,status:arc?"Gearchiveerd":"Gepland"});
    await laadProjecten();S.page="dash";render();toast(arc?"Project gearchiveerd 📦":"Project hersteld ✅");
  }catch(e){}
}

function addMember(){
  var name=gv("am-name").trim();var role=gv("am-role").trim();var pw=gv("am-pw").trim();
  if(!name||!role||!pw){toast("Vul alle velden in");return;}
  var init=name.split(" ").map(function(w){return w[0];}).join("").substring(0,2).toUpperCase();
  var cols=["#27ae60","#2980b9","#7b3fa0","#c0392b","#e67e22","#16a085"];
  var email=gv("am-email").trim();
  TEAM.push({id:Date.now(),name:name,role:role,av:init,color:cols[TEAM.length%cols.length],pw:pw,admin:false,photo:null,email:email||""});
  closeModal();toast("Teamlid toegevoegd 👷");
}
function openEditMember(id){S.editMem=JSON.parse(JSON.stringify(TEAM.find(function(m){return m.id===id;})||{}));S.modal="editmember";render();}
function saveMemberEdit(){
  if(!S.editMem)return;
  var newpw=gv("em-pw").trim();var adminCb=g("em-admin");
  TEAM.forEach(function(m){
    if(m.id===S.editMem.id){
      m.name=gv("em-name").trim()||m.name;m.role=gv("em-role").trim()||m.role;
      if(gv("em-email").trim())m.email=gv("em-email").trim();
      if(newpw&&newpw.length>=4)m.pw=newpw;if(adminCb)m.admin=adminCb.checked;
    }
  });
  if(S.user.id===S.editMem.id)S.user=TEAM.find(function(m){return m.id===S.editMem.id;})||S.user;
  closeModal();toast("Teamlid bijgewerkt ✅");
}
function savePw(){
  var next=gv("pw-next");var conf=gv("pw-conf");
  var errEl=g("pw-err");var okEl=g("pw-ok");
  if(next.length<8){if(errEl){errEl.textContent="⚠️ Minimaal 8 tekens.";errEl.style.display="block";}return;}
  if(next!==conf){if(errEl){errEl.textContent="⚠️ Komen niet overeen.";errEl.style.display="block";}return;}
  TEAM.forEach(function(m){if(m.id===S.user.id)m.pw=next;});S.user.pw=next;
  if(errEl)errEl.style.display="none";if(okEl)okEl.style.display="block";toast("Wachtwoord gewijzigd 🔒");
}
function saveTpl(){
  var name=gv("at-name").trim();var body=gv("at-tasks");if(!name||!body.trim())return;
  TPLS[name]=body.split("\n").map(function(s){return s.trim();}).filter(Boolean);
  closeModal();toast("Sjabloon opgeslagen 📋");
}
function openEditTpl(name){S.editTpl={name:name,origName:name,tasks:TPLS[name]||[]};S.modal="edittpl";render();}
function saveEditTpl(){
  var name=gv("etp-name").trim();var body=gv("etp-tasks");if(!name||!body.trim())return;
  var tasks=body.split("\n").map(function(s){return s.trim();}).filter(Boolean);
  if(S.editTpl&&S.editTpl.origName!==name)delete TPLS[S.editTpl.origName];
  TPLS[name]=tasks;closeModal();toast("Sjabloon bijgewerkt ✅");
}
function deleteTpl(name){if(confirm('Sjabloon "'+name+'" verwijderen?')){delete TPLS[name];render();toast("Sjabloon verwijderd 🗑");}}

// ── START ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
