var _pollId=null;
function startPolling(){
  stopPolling();
  _pollId=setInterval(function(){
    var el=document.activeElement;
    if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'))return;
    syncDown(false);
  },6000);
}
function stopPolling(){if(_pollId){clearInterval(_pollId);_pollId=null;}}

function syncDown(showLoader){
  return Promise.all([
    sbGet('projecten','order=aangemaakt_op.desc').catch(function(){return null;}),
    sbGet('taken','order=aangemaakt_op.asc').catch(function(){return null;})
  ]).then(function(results){
    var projs=results[0],tasks=results[1];
    if(projs&&Array.isArray(projs)&&projs.length>=0){
      PROJECTS=projs.map(mapProject);
      saveProjects(null);
    }
    if(tasks&&Array.isArray(tasks)&&tasks.length>=0){
      TASKS=tasks.map(mapTask);
      saveTasks(null);
    }
    if(showLoader!==false)render();
    return {projects:PROJECTS,tasks:TASKS};
  }).catch(function(e){console.warn('Sync mislukt:',e);});
}

function sbSaveProject(p){
  var data={naam:p.name,adres:p.address,postcode:p.postcode,city:p.city,status:p.status,voortgang:p.progress,start_datum:p.start||null,eind_datum:p.end||null,teamleden:p.assignees||[],notities:p.notes||'',lat:p.lat||null,lon:p.lon||null};
  var existing=typeof p.id==='number'&&p.id<1700000000000;
  if(existing){return sbPatch('projecten',p.id,data).catch(function(){});}
  else{return sbPost('projecten',data).then(function(res){if(res&&res[0])p.id=res[0].id;return res;}).catch(function(){});}
}

function sbSaveTask(t){
  var data={project_id:t.project_id,titel:t.title,toegewezen_aan:t.assignee||null,deadline:t.deadline||null,status:t.status||'Open',prioriteit:t.priority||'Normaal'};
  var existing=typeof t.id==='number'&&t.id<1700000000000;
  if(existing){return sbPatch('taken',t.id,data).catch(function(){});}
  else{return sbPost('taken',data).then(function(res){if(res&&res[0])t.id=res[0].id;return res;}).catch(function(){});}
}

function sbDelProject(id){return sbDel('projecten',id).catch(function(){});}
function sbDelTask(id){return sbDel('taken',id).catch(function(){});}

function latLonToTile(lat,lon,zoom){
  var n=Math.pow(2,zoom);
  var x=Math.floor((lon+180)/360*n);
  var latR=lat*Math.PI/180;
  var y=Math.floor((1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n);

function bell(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [1047,1319,1568].forEach(function(f,i){
      var o=ctx.createOscillator(),gn=ctx.createGain();
      o.connect(gn);gn.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      var t=ctx.currentTime+i*0.12;
      gn.gain.setValueAtTime(0,t);
      gn.gain.linearRampToValueAtTime(0.2,t+0.02);
      gn.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t);o.stop(t+0.4);
    });
  }catch(e){}
}

function drawMap(){var el=byId('map');if(!el||typeof L==='undefined')return;if(S.map){S.map.remove();S.map=null}S.map=L.map('map').setView([53.16,5.82],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(S.map);var markers=[];PROJECTS.forEach(function(p){var c=coordsForProject(p);var m=L.marker(c).addTo(S.map).bindPopup('<b>'+esc(p.name)+'</b><br>'+esc(fullAddress(p))+'<br><button style="margin-top:8px;padding:7px 10px;border-radius:8px;border:0;background:#123d72;color:#fff;font-weight:800" onclick="MSF.openProject('+p.id+')">Openen</button> <button style="margin-top:8px;padding:7px 10px;border-radius:8px;border:0;background:#f47b16;color:#fff;font-weight:800" onclick="MSF.editProject('+p.id+')">Bewerken</button>');markers.push(m);geocodeProject(p,function(c2){if(c2){m.setLatLng([c2.lat,c2.lon]);saveProjects(null)}})});if(markers.length){try{S.map.fitBounds(L.featureGroup(markers).getBounds().pad(.18))}catch(e){}}}

function projectModal(){var p=S.editing||{name:'',address:'',postcode:'',city:'',status:'Gepland',progress:0,start:'',end:'',notes:'',assignees:[]};var preview=projectImage(p);return '<div class="modal-bg"><div class="modal"><div class="modal-title"><h3>'+(p.id?'Project bewerken':'Nieuw project')+'</h3><button class="round" style="width:38px;height:38px" onclick="MSF.closeModal()">×</button></div><div class="modal-body"><div class="field"><label>Naam</label><input id="pName" value="'+esc(p.name)+'"></div><div class="field"><label>Adres (straat + huisnummer)</label><input id="pAddress" value="'+esc(p.address)+'" oninput="MSF.previewAddress()"></div><div class="form-grid"><div class="field"><label>Postcode</label><input id="pPostcode" value="'+esc(p.postcode)+'" oninput="MSF.autofillCity();MSF.previewAddress()"><div class="addr-help">Bijv. 9212 PA. Woonplaats wordt waar mogelijk automatisch ingevuld.</div></div><div class="field"><label>Woonplaats</label><input id="pCity" value="'+esc(normalizeCity(p.city))+'" oninput="MSF.previewAddress()"></div></div><div class="map-preview"><img id="addrPreview" src="'+esc(preview)+'" onerror="this.style.display=\'none\'"></div><div class="readonly-row"><div class="field"><label>Kaartadres</label><input id="pFullAddress" readonly value="'+esc(fullAddress(p))+'"></div><div class="field"><label>Locatiebron</label><input readonly value="OpenStreetMap preview"></div></div><div class="form-grid"><div class="field"><label>Start</label><input type="date" id="pStart" value="'+esc(p.start)+'"></div><div class="field"><label>Einde</label><input type="date" id="pEnd" value="'+esc(p.end)+'"></div></div><div class="form-grid"><div class="field"><label>Status</label><select id="pStatus"><option '+(p.status==='Actief'?'selected':'')+'>Actief</option><option '+(p.status==='Gepland'?'selected':'')+'>Gepland</option><option '+(p.status==='Afgerond'?'selected':'')+'>Afgerond</option></select></div><div class="field"><label>Voortgang %</label><input type="number" min="0" max="100" id="pProgress" value="'+Number(p.progress||0)+'"></div></div><div class="field"><label>Notities</label><textarea id="pNotes">'+esc(p.notes)+'</textarea></div><div class="modal-actions"><button class="btn orange" style="flex:1" onclick="MSF.saveProject()">Opslaan</button><button class="btn light" onclick="MSF.closeModal()">Annuleren</button></div></div></div></div>'}
function taskModal(){return '<div class="modal-bg"><div class="modal"><div class="modal-title"><h3>Nieuwe taak</h3><button class="round" style="width:38px;height:38px" onclick="MSF.closeModal()">×</button></div><div class="modal-body"><div class="field"><label>Omschrijving</label><input id="tTitle"></div><div class="form-grid"><div class="field"><label>Project</label><select id="tProject">'+PROJECTS.map(function(p){return '<option value="'+p.id+'">'+esc(p.name)+'</option>'}).join('')+'</select></div><div class="field"><label>Toegewezen aan</label><select id="tAss">'+TEAM.map(function(m){return '<option value="'+m.id+'">'+esc(m.name)+'</option>'}).join('')+'</select></div></div><div class="form-grid"><div class="field"><label>Deadline</label><input type="date" id="tDeadline"></div><div class="field"><label>Prioriteit</label><select id="tPrio"><option>Normaal</option><option>Hoog</option></select></div></div><div class="modal-actions"><button class="btn orange" style="flex:1" onclick="MSF.saveTask()">Aanmaken</button><button class="btn light" onclick="MSF.closeModal()">Annuleren</button></div></div></div></div>'}
window.MSF={selLogin:function(id){S.loginSel=id;S.loginErr='';renderLogin();setTimeout(function(){var i=byId('loginPw');if(i)i.focus()},20)},doLogin:function(){var u=person(S.loginSel);var pw=(byId('loginPw')||{}).value||'';if(pw===u.pw){var mem=load('msf_login_memory',{});if(byId('rememberPw')&&byId('rememberPw').checked){mem[u.id]=pw}else{delete mem[u.id]}save('msf_login_memory',mem);S.user=u;S.page='home';save('msf_last_user',u.id);syncDown(false).then(function(){render();startPolling();});document.getElementById('splash').style.display='none';render()}else{S.loginErr='Onjuist wachtwoord.';renderLogin()}},openMember:function(id){S.selectedMember=id;S.page='team';render();},closeMember:function(){S.selectedMember=null;S.page='team';render();},toggleNotifs:function(){S.showNotifs=!S.showNotifs;render();},markRead:function(){S.notifs.forEach(function(n){n.read=true;});S.showNotifs=false;render();},logout:function(){stopPolling();S.user=null;save('msf_last_user',null);renderLogin();},go:function(p){S.page=p;render()},openProject:function(id){S.projectId=id;S.page='project';render()},openModal:function(m){S.editing=null;S.modal=m;render()},closeModal:function(){S.modal=null;S.editing=null;render()},editProject:function(id){S.editing=JSON.parse(JSON.stringify(project(id)));S.modal='project';render()},autofillCity:function(){var pc=byId('pPostcode');var city=byId('pCity');if(!pc||!city)return;var found=postcodeCity(pc.value);if(found&&!city.value.trim())city.value=found},previewAddress:function(){var p={address:(byId('pAddress')||{}).value||'',postcode:(byId('pPostcode')||{}).value||'',city:(byId('pCity')||{}).value||''};var full=byId('pFullAddress');if(full)full.value=fullAddress(p);var img=byId('addrPreview');if(img){img.style.display='block';img.src=projectImage(p)}},saveProject:function(){var p=S.editing||{id:Date.now(),img:IMGS[0],assignees:[S.user.id]};p.name=byId('pName').value.trim()||'Nieuw project';p.address=byId('pAddress').value.trim();p.postcode=byId('pPostcode').value.trim().toUpperCase();p.city=normalizeCity(byId('pCity').value.trim()||postcodeCity(p.postcode));p.start=byId('pStart').value;p.end=byId('pEnd').value;p.status=byId('pStatus').value;p.progress=Math.max(0,Math.min(100,parseInt(byId('pProgress').value||0,10)));p.notes=byId('pNotes').value;p.img=projectImage(p);var i=PROJECTS.findIndex(function(x){return x.id===p.id});if(i>=0)PROJECTS[i]=p;else PROJECTS.unshift(p);save('msf_projects_v23',PROJECTS);sbSaveProject(p).then(function(){syncDown(false);});geocodeProject(p,function(){save('msf_projects_v23',PROJECTS);sbSaveProject(p).catch(function(){});render();});S.modal=null;S.editing=null;toast('Project opgeslagen en kaart bijgewerkt');render()},selectTaskProject:function(id){S.taskProjectId=id;renderPageOnly()},saveTask:function(){var title=byId('tTitle').value.trim();if(!title){toast('Vul een taak in');return}TASKS.push({id:Date.now(),project_id:parseInt(byId('tProject').value,10),title:title,assignee:parseInt(byId('tAss').value,10),deadline:byId('tDeadline').value,status:'Te doen',priority:byId('tPrio').value});var _t=TASKS[TASKS.length-1];save('msf_tasks_v23',TASKS);sbPost('taken',{project_id:_t.project_id,titel:_t.title,toegewezen_aan:_t.assignee||null,deadline:_t.deadline||null,status:_t.status,prioriteit:_t.priority}).then(function(r){if(r&&r[0]&&r[0].id)_t.id=r[0].id;}).catch(function(){});if(_t.assignee&&_t.assignee!==S.user.id)addNotif('Nieuwe taak: "'+_t.title+'"',true,_t.assignee);S.modal=null;toast('Taak aangemaakt');render()},toggleTask:function(id,done){
  var t=TASKS.find(function(x){return x.id===id;});
  if(!t)return;
  t.status=done?'Voltooid':'Te doen';
  save('msf_tasks_v23',TASKS);
  sbPatch('taken',id,{status:t.status,afgerond:done}).catch(function(){});
  render();
},
resetLocal:function(){if(confirm('Lokale testdata resetten?')){localStorage.removeItem('msf_projects_v23');localStorage.removeItem('msf_tasks_v23');PROJECTS=PROJECTS_DEFAULT.slice();TASKS=TASKS_DEFAULT.slice();toast('Testdata gereset');render()}}};
setTimeout(function(){
  document.getElementById('splash').style.display='none';
  var last=load('msf_last_user',null);
  var u=last?person(last):null;
  if(u){
    S.user=u;
    render(); // show immediately from localStorage
    syncDown(false).then(function(){render();}).catch(function(){});
    startPolling();
  } else {
    renderLogin();
  }
},450);
})();
</script>
