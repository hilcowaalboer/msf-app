<style id="msf-v25-bottom-visible-fix">
/* v25 preview: onderkant zichtbaar + veilige scroll */
html, body {
  min-height: 100%;
  height: auto !important;
  overflow-y: auto !important;
  overscroll-behavior: auto;
}

body {
  padding-bottom: 0 !important;
}

.page {
  min-height: auto !important;
  padding-bottom: 120px !important;
  overflow: visible !important;
}

.card,
.panel,
.project-list,
.sidebar,
.tablewrap,
.admin-box,
.chat-users,
.chat-main {
  min-height: 0;
}

/* Geen afgesneden onderkanten meer door calc(100vh...) */
.project-list,
.sidebar,
.tablewrap {
  max-height: none !important;
  height: auto !important;
  overflow: visible !important;
}

/* Tabellen blijven wel horizontaal scrollbaar */
.tablewrap,
.admin-table-scroll {
  overflow-x: auto !important;
  overflow-y: visible !important;
  -webkit-overflow-scrolling: touch;
}

/* Kaart krijgt vaste nette hoogte, maar snijdt de pagina niet af */
.mapbox {
  height: 620px !important;
  min-height: 480px !important;
  max-height: none !important;
}

.detail-map {
  height: 380px !important;
  min-height: 320px !important;
}

/* Chat moet zichtbaar blijven en binnen eigen venster scrollen */
.chat-layout {
  height: auto !important;
  min-height: 620px !important;
}

.chat-main {
  min-height: 620px !important;
}

.chat-stream {
  min-height: 430px !important;
  max-height: 520px !important;
  overflow-y: auto !important;
}

/* Navigatie mag scrollen bij smalle schermen */
.navrow {
  overflow-x: auto !important;
  overflow-y: hidden !important;
}

/* Modal knoppen altijd bereikbaar */
.modal {
  max-height: 92vh !important;
}

.modal-body {
  max-height: calc(92vh - 76px) !important;
  overflow-y: auto !important;
  padding-bottom: 90px !important;
}

.modal-actions {
  position: sticky !important;
  bottom: 0 !important;
  background: #fff !important;
  padding: 14px 0 0 !important;
  box-shadow: 0 -8px 18px rgba(255,255,255,.92);
}

/* Mobiel: alles netjes onder elkaar */
@media(max-width:1180px){
  .page {
    padding-bottom: 140px !important;
  }
  .mapbox {
    height: 540px !important;
  }
  .chat-layout,
  .chat-main {
    min-height: 560px !important;
  }
}

@media(max-width:720px){
  .page {
    padding-bottom: 160px !important;
  }
  .mapbox {
    height: 460px !important;
  }
  .chat-stream {
    max-height: 420px !important;
  }
}
</style>


<style id="msf-v26-scroll-and-bars">
/* v26: volledige pagina scrollbaar + statusbalken zichtbaar */
html, body {
  height: auto !important;
  min-height: 100% !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}

body {
  scrollbar-width: thin;
  scrollbar-color: #9fb3d1 #edf2f8;
}

body::-webkit-scrollbar,
.project-list::-webkit-scrollbar,
.sidebar::-webkit-scrollbar,
.tablewrap::-webkit-scrollbar,
.chat-stream::-webkit-scrollbar,
.admin-table-scroll::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

body::-webkit-scrollbar-thumb,
.project-list::-webkit-scrollbar-thumb,
.sidebar::-webkit-scrollbar-thumb,
.tablewrap::-webkit-scrollbar-thumb,
.chat-stream::-webkit-scrollbar-thumb,
.admin-table-scroll::-webkit-scrollbar-thumb {
  background: #9fb3d1;
  border-radius: 999px;
}

body::-webkit-scrollbar-track,
.project-list::-webkit-scrollbar-track,
.sidebar::-webkit-scrollbar-track,
.tablewrap::-webkit-scrollbar-track,
.chat-stream::-webkit-scrollbar-track,
.admin-table-scroll::-webkit-scrollbar-track {
  background: #edf2f8;
}

.page {
  padding-bottom: 150px !important;
  overflow: visible !important;
}

.msf-alert-bars {
  max-width: 1540px;
  margin: 18px auto 0;
  padding: 0 22px;
  display: grid;
  grid-template-columns: repeat(3, minmax(240px, 1fr));
  gap: 12px;
}

.msf-alert-bar {
  min-height: 64px;
  border-radius: 16px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid #d8e2f2;
  box-shadow: 0 8px 22px rgba(8,40,86,.07);
  background: #fff;
}

.msf-alert-icon {
  width: 42px;
  height: 42px;
  border-radius: 13px;
  display: grid;
  place-items: center;
  font-size: 20px;
  flex: 0 0 auto;
}

.msf-alert-bar.done .msf-alert-icon {
  background: #dcfce7;
  color: #166534;
}

.msf-alert-bar.assigned .msf-alert-icon {
  background: #dbeafe;
  color: #1d4ed8;
}

.msf-alert-bar.project .msf-alert-icon {
  background: #ffedd5;
  color: #c2410c;
}

.msf-alert-title {
  font-weight: 800;
  color: #0b2146;
  line-height: 1.15;
}

.msf-alert-sub {
  font-size: 12px;
  color: #70809d;
  margin-top: 3px;
}

.project-list,
.sidebar,
.tablewrap {
  overflow-y: auto !important;
  overflow-x: auto !important;
  max-height: calc(100vh - 260px) !important;
  min-height: 420px;
}

.projects-layout,
.tasks-layout,
.chat-layout,
.admin-grid,
.detail-grid {
  align-items: start;
}

.mapbox {
  height: calc(100vh - 260px) !important;
  min-height: 520px !important;
}

.table {
  min-width: 940px;
}

@media(max-width:1180px){
  .msf-alert-bars {
    grid-template-columns: 1fr;
  }

  .project-list,
  .sidebar,
  .tablewrap {
    max-height: none !important;
    min-height: auto;
  }

  .mapbox {
    height: 560px !important;
  }
}

@media(max-width:720px){
  .msf-alert-bars {
    padding: 0 12px;
  }

  .msf-alert-bar {
    min-height: 58px;
    padding: 11px 13px;
  }

  .page {
    padding-bottom: 170px !important;
  }
}
</style>

function cityFromPostcode(pc){pc=String(pc||'').replace(/\s/g,'').toUpperCase().slice(0,4);var map={'9241':'Wijnjewoude','8911':'Leeuwarden','8912':'Leeuwarden','8801':'Franeker','8861':'Harlingen','9212':'Boornbergum','9162':'Ballum','8442':'Heerenveen','8701':'Bolsward','9201':'Drachten','8601':'Sneek','9101':'Dokkum'};return map[pc]||''}
function normalizeCity(c){c=String(c||'').trim();if(!c)return '';var found=Object.keys(FRIESLAND).find(function(x){return x.toLowerCase()===c.toLowerCase()});return found||c.charAt(0).toUpperCase()+c.slice(1)}

function msfCleanAddressText(v){return String(v||'').replace(/\s+/g,' ').trim();}
function msfOpenStreetViewLink(p){
  var q=msfCleanAddressText(fullAddress(p));
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q||'Friesland Nederland');
}
function msfKnownStreetViewThumb(p){
  var addr=msfCleanAddressText(fullAddress(p)).toLowerCase();
  if(addr.indexOf('ljippeblom')>-1 || addr.indexOf('ijippeblom')>-1 || addr.indexOf('boornbergum')>-1){
    return 'https://streetviewpixels-pa.googleapis.com/v1/thumbnail?cb_client=maps_sv.tactile&w=900&h=600&pitch=-11.384691219298944&panoid=_QTJPxrRO3q8Xg64LfrqXg&yaw=249.17474163257836';
  }
  return '';
}

function msfExtractStreetViewImageUrl(url){
  url = String(url||'').trim();
  if(!url) return '';

  // Direct bruikbare thumbnail/image URL
  if(url.indexOf('streetviewpixels')>-1 || url.indexOf('googleusercontent')>-1 || url.match(/\.(jpg|jpeg|png|webp)(\?|$)/i)){
    return url;
  }

  // Google Maps StreetView URL bevat vaak panoid en parameters in de query.
  // Browser-JS kan niet betrouwbaar uit elke Maps URL een foto maken zonder API-key.
  // Daarom bewaren we de originele link als mapsUrl en gebruiken we afbeelding-fallback.
  return '';
}
function msfManualStreetViewOrFallback(p){
  if(p.streetview_url){
    var img = msfExtractStreetViewImageUrl(p.streetview_url);
    if(img) return img;
  }
  return msfAddressImage(p);
}
function msfOpenStreetViewLink(p){
  if(p.streetview_url) return p.streetview_url;
  return msfGoogleMapsUrl(p);
}

function msfAddressImage(p){
  var known=msfKnownStreetViewThumb(p);
  if(known)return known;
  return staticMapUrl(p,700,420,16);
}
function msfNominatimQuery(p){return [p.address,p.postcode,p.city,'Nederland'].filter(Boolean).join(', ');}
function msfGeocodeProject(p,cb){
  var q=msfNominatimQuery(p);
  if(!q.trim()){if(cb)cb(null);return;}
  var key='msf_geo_'+q.toLowerCase();
  try{
    var cached=localStorage.getItem(key);
    if(cached){
      var c=JSON.parse(cached);
      if(c&&c.lat&&c.lon){p.lat=Number(c.lat);p.lon=Number(c.lon);if(cb)cb(c);return;}
    }
  }catch(e){}
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=nl&q='+encodeURIComponent(q),{headers:{'Accept':'application/json'}})
  .then(function(r){return r.json();})
  .then(function(list){
    if(list&&list[0]){
      var c={lat:parseFloat(list[0].lat),lon:parseFloat(list[0].lon),display_name:list[0].display_name||q};
      p.lat=c.lat;p.lon=c.lon;
      try{localStorage.setItem(key,JSON.stringify(c));}catch(e){}
      if(cb)cb(c);
    }else{if(cb)cb(null);}
  }).catch(function(){if(cb)cb(null);});
}

function fullAddress(p){return [p.address,p.postcode,normalizeCity(p.city)].filter(Boolean).join(', ')}
function coordsForProject(p){var a=String((p&&p.address||'')+' '+(p&&p.postcode||'')+' '+(p&&p.city||'')).toLowerCase();if(a.indexOf('stripe')>-1&&a.indexOf('wijnjewoude')>-1)return [53.071565323463,6.2260332798134];if(p&&p.lat&&p.lon)return [Number(p.lat),Number(p.lon)];var city=normalizeCity(p.city)||cityFromPostcode(p.postcode);if(FRIESLAND[city])return FRIESLAND[city];return [53.12,5.85]}
function staticMapUrl(p,w,h,z){var c=coordsForProject(p);return 'https://staticmap.openstreetmap.de/staticmap.php?center='+c[0]+','+c[1]+'&zoom='+(z||15)+'&size='+(w||600)+'x'+(h||300)+'&markers='+c[0]+','+c[1]+',red-pushpin'}
function streetViewUrl(p,w,h){return 'https://maps.googleapis.com/maps/api/streetview?size='+(w||600)+'x'+(h||300)+'&location='+encodeURIComponent(fullAddress(p)||p.city||'Friesland Nederland')+'&fov=80&heading=70&pitch=0'}
function msfOpenStreetViewLink(p){var c=coordsForProject(p);return 'https://www.google.com/maps?q=&layer=c&cbll='+c[0]+','+c[1]}

function msfStreetViewForProject(p){
  var addr=(fullAddress(p)||'').toLowerCase();

  if(addr.indexOf('ljippeblom')>-1 || addr.indexOf('ijippeblom')>-1 || addr.indexOf('boornbergum')>-1){
    return 'https://streetviewpixels-pa.googleapis.com/v1/thumbnail?cb_client=maps_sv.tactile&w=900&h=600&pitch=-11.384691219298944&panoid=_QTJPxrRO3q8Xg64LfrqXg&yaw=249.17474163257836';
  }

  // Betrouwbare fallback: kaartbeeld op basis van adres/postcode/woonplaats.
  // Dit voorkomt de kapotte Google StreetView-afbeeldingen zonder API-key.
  return staticMapUrl(p,700,420,16);
}

function msfReadFileAsDataUrl(file, cb){
  if(!file){cb(null);return;}
  if(!file.type || file.type.indexOf('image/')!==0){
    toast('Kies een afbeelding');
    cb(null);
    return;
  }
  if(file.size > 3 * 1024 * 1024){
    toast('Afbeelding is te groot. Maximaal 3 MB.');
    cb(null);
    return;
  }
  var reader = new FileReader();
  reader.onload = function(){ cb(reader.result); };
  reader.onerror = function(){ toast('Afbeelding lezen mislukt'); cb(null); };
  reader.readAsDataURL(file);
}

}
function msfSetStreetViewApiKey(key){
  try{localStorage.setItem('msf_google_streetview_api_key',String(key||'').trim());}catch(e){}
}
function msfAutoStreetViewUrl(p){
  var key=msfStreetViewApiKey();
  if(!key)return '';
  return 'https://maps.googleapis.com/maps/api/streetview?size=900x600&location='+encodeURIComponent(fullAddress(p))+'&fov=80&pitch=0&key='+encodeURIComponent(key);
}

function msfStripe40Thumb(p){
  var addr=String(fullAddress(p)||'').toLowerCase();
  if(addr.indexOf('stripe')>-1 && (addr.indexOf('40')>-1 || addr.indexOf('9241')>-1 || addr.indexOf('wijnjewoude')>-1)){
    return 'https://staticmap.openstreetmap.de/staticmap.php?center=53.071565323463,6.2260332798134&zoom=17&size=900x600&markers=53.071565323463,6.2260332798134,red-pushpin';
  }
  return '';
}

function msfAddressImageAuto(p){var stripe=msfStripe40Thumb(p);if(stripe)return stripe;
  var known='';
  try{known=msfKnownStreetViewThumb(p);}catch(e){}
  if(known)return known;
  var api=msfAutoStreetViewUrl(p);
  if(api)return api;
  return staticMapUrl(p,700,420,16);
}
function projectVisual(p){return msfAddressImageAuto(p);}
function projectImage(p){return msfAddressImageAuto(p);}
function msfManualStreetViewOrFallback(p){return msfAddressImageAuto(p);}
function msfStreetViewSettingsBlock(){
  var key=msfStreetViewApiKey();
  return '<div class="streetview-key-box"><h3 style="margin:0 0 8px;color:#0b2146">Automatische StreetView</h3>'
    + '<p style="margin:0 0 10px;color:#52657f">Vul éénmalig een Google StreetView Static API-key in. Daarna maakt de app automatisch StreetView-afbeeldingen op basis van adres, postcode en woonplaats.</p>'
    + '<input id="streetviewApiKey" type="password" value="'+esc(key)+'" placeholder="Google StreetView Static API-key">'
    + '<div style="display:flex;gap:10px;margin-top:10px"><button class="btn orange" onclick="MSF.saveStreetViewKey()">API-key opslaan</button><button class="btn light" onclick="MSF.clearStreetViewKey()">API-key wissen</button></div>'
    + '<div class="streetview-auto-note">Zonder API-key gebruikt de app automatisch kaartbeeld. Met API-key gebruikt de app automatisch StreetView waar Google dit beschikbaar heeft. Ljippeblom gebruikt al de bekende thumbnail.</div></div>';
}

window.MSF={

autoCity:function(){var pc=byId('pPostcode'), city=byId('pCity');if(pc&&city&&!city.value.trim()){city.value=cityFromPostcode(pc.value)}},
saveProject:function(){var p=S.editing||{id:Date.now()};p.name=byId('pName').value.trim()||'Nieuw project';p.address=byId('pAddress').value.trim();p.postcode=byId('pPostcode').value.trim().toUpperCase();p.city=normalizeCity(byId('pCity').value.trim()||cityFromPostcode(p.postcode));p.start=byId('pStart').value;p.end=byId('pEnd').value;p.status=byId('pStatus').value;p.progress=Math.max(0,Math.min(100,parseInt(byId('pProgress').value||0,10)));p.notes=byId('pNotes').value;p.streetview_url=(byId('pStreetviewUrl')?byId('pStreetviewUrl').value.trim():'');p.assignees=Array.from(byId('pAssignees').selectedOptions).map(function(o){return parseInt(o.value,10)});var idx=PROJECTS.findIndex(function(x){return x.id===p.id});var isNew=idx<0;if(idx>=0)PROJECTS[idx]=p;else PROJECTS.unshift(p);if(isNew){(p.assignees||[]).forEach(function(uid){addNotif('Nieuw project toegewezen: '+p.name,uid,true);});}else{(p.assignees||[]).forEach(function(uid){addNotif('Project toegewezen/bijgewerkt: '+p.name,uid,false);});}persist();S.modal=null;S.editing=null;toast('Project opgeslagen');render();msfGeocodeProject(p,function(c){p.img=msfAddressImageAuto(p);persist();render();if(c){toast('Adres gekoppeld aan Google Maps/kaart')}else{toast('Adres opgeslagen; kaartbeeld gebruikt als fallback')}})},
setTaskMember:function(v){S.taskMember=v;renderPageOnly()},
setTaskProject:function(v){S.taskProject=v;renderPageOnly()},
clearTaskFilters:function(){S.taskMember='all';S.taskProject='all';renderPageOnly()},
selectTasksForProject:function(id){S.taskProject=id;S.page='tasks';render()},
editTask:function(id){S.editing=JSON.parse(JSON.stringify(TASKS.find(function(t){return t.id===id})));S.modal='task';render()},
saveTask:function(){var t=S.editing||{id:Date.now()};var old=TASKS.find(function(x){return x.id===t.id});t.title=byId('tTitle').value.trim()||'Nieuwe taak';t.project_id=parseInt(byId('tProject').value,10);t.assignee=parseInt(byId('tAssignee').value,10);t.deadline=byId('tDeadline').value;t.status=byId('tStatus').value;t.priority=byId('tPriority').value;var idx=TASKS.findIndex(function(x){return x.id===t.id});if(idx>=0)TASKS[idx]=t;else TASKS.push(t);if(!old||old.assignee!==t.assignee){addNotif('Taak toegewezen: '+t.title,t.assignee,true)}if(old&&old.status!==t.status&&t.status==='Voltooid'){addNotif('Taak afgevinkt: '+t.title,null,true)}persist();S.modal=null;S.editing=null;toast('Taak opgeslagen');render()},
toggleTask:function(id,checked){var t=TASKS.find(function(x){return x.id===id});if(!t)return;t.status=checked?'Voltooid':'Te doen';addNotif((checked?'Taak afgevinkt: ':'Taak heropend: ')+t.title,null,true);persist();renderPageOnly()},
deleteTask:function(id){if(confirm('Taak verwijderen?')){TASKS=TASKS.filter(function(t){return t.id!==id});persist();renderPageOnly()}},
sendChat:function(){var txt=(byId('chatText')||{}).value||'';txt=txt.trim();if(!txt)return;MESSAGES.push({id:Date.now(),user:S.user.id,text:txt,time:now()});addNotif(S.user.name.split(' ')[0]+' stuurde een teamchatbericht',null,true);persist();render();setTimeout(function(){var s=byId('chatStream');if(s)s.scrollTop=s.scrollHeight},40)},
editMember:function(id){S.editing=JSON.parse(JSON.stringify(person(id)));S.modal='member';render()},
saveMember:function(){var m=S.editing||{id:Date.now(),color:'#123d72'};m.name=byId('mName').value.trim()||'Nieuw teamlid';m.role=byId('mRole').value.trim()||'Medewerker';m.email=byId('mEmail').value.trim();m.pw=byId('mPw').value.trim()||'msf-nieuw2026';m.admin=byId('mAdmin').checked;m.av=m.name.split(' ').map(function(x){return x[0]}).join('').slice(0,2).toUpperCase();var idx=TEAM.findIndex(function(x){return x.id===m.id});if(idx>=0)TEAM[idx]=m;else TEAM.push(m);persist();S.modal=null;S.editing=null;toast('Teamlid opgeslagen');render()},
deleteMember:function(id){if(id===S.user.id){toast('Je kunt jezelf niet verwijderen');return}if(confirm('Teamlid verwijderen?')){TEAM=TEAM.filter(function(m){return m.id!==id});TASKS.forEach(function(t){if(t.assignee===id)t.assignee=S.user.id});persist();render()}},
editTemplate:function(i){S.editIndex=i;S.editing=JSON.parse(JSON.stringify(TEMPLATES[i]));S.modal='template';render()},
saveTemplate:function(){var t={name:byId('tplName').value.trim()||'Nieuw sjabloon',type:byId('tplType').value,items:byId('tplItems').value.split('\n').map(function(x){return x.trim()}).filter(Boolean)};if(typeof S.editIndex==='number')TEMPLATES[S.editIndex]=t;else TEMPLATES.push(t);S.editIndex=null;S.modal=null;persist();toast('Sjabloon opgeslagen');render()},
deleteTemplate:function(i){if(confirm('Sjabloon verwijderen?')){TEMPLATES.splice(i,1);persist();render()}},
editRole:function(i){S.editIndex=i;S.editing=JSON.parse(JSON.stringify(ROLES[i]));S.modal='role';render()},
saveRole:function(){var r={name:byId('roleName').value.trim()||'Nieuwe rol',rights:byId('roleRights').value.split('\n').map(function(x){return x.trim()}).filter(Boolean)};if(typeof S.editIndex==='number')ROLES[S.editIndex]=r;else ROLES.push(r);S.editIndex=null;S.modal=null;persist();toast('Rol opgeslagen');render()},
exportData:function(){var data={team:TEAM,projects:PROJECTS,tasks:TASKS,messages:MESSAGES,templates:TEMPLATES,roles:ROLES,notifs:S.notifs};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='msf-backup.json';a.click();URL.revokeObjectURL(a.href)},
resetAll:function(){if(confirm('Alle lokale data resetten naar testdata?')){TEAM=TEAM_DEFAULT.slice();PROJECTS=PROJECTS_DEFAULT.slice();TASKS=TASKS_DEFAULT.slice();MESSAGES=[];TEMPLATES=TEMPLATES_DEFAULT.slice();ROLES=ROLES_DEFAULT.slice();S.notifs=[];persist();toast('Data gereset');render()}},
openChat:function(key){
  S.chatChannel=key||'team';
  render();
  setTimeout(function(){
    var stream=document.getElementById('messagesStream');
    if(stream)stream.scrollTop=stream.scrollHeight;
  },50);
},

openChatChannel:function(channel){
  S.chatChannel=String(channel||'team');
  render();
},
deleteMessage:function(id){
  var msgs=msfChatMessages();
  var msg=msgs.find(function(m){return m.id===id;});
  if(!msg)return;
  if(!msfCanDeleteMessage(msg)){
    toast('Je kunt alleen je eigen berichten verwijderen');
    return;
  }
  msgs=msgs.filter(function(m){return m.id!==id;});
  msfSaveChatMessages(msgs);
  toast('Bericht verwijderd');
  render();
},
sendMessage:function(){
  var input=document.getElementById('messageText');
  var fileInput=document.getElementById('messageImage');
  if(!input)return;
  var text=input.value.trim();
  var file=fileInput && fileInput.files && fileInput.files[0];

  if(!text && !file){
    toast('Typ een bericht of kies een foto');
    return;
  }

  msfReadFileAsDataUrl(file,function(dataUrl){
    var msgs=msfChatMessages();
    msgs.push({
      id:Date.now(),
      channel:S.chatChannel||'team',
      user:S.user?S.user.id:4,
      time:new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}),
      text:text,
      image:dataUrl||null
    });
    msfSaveChatMessages(msgs);
    addNotif('Nieuw chatbericht'+(dataUrl?' met foto':'')+': '+(text||'foto'),null,true);
    input.value='';
    if(fileInput)fileInput.value='';
    render();
    setTimeout(function(){
      var stream=document.getElementById('messagesStream');
      if(stream)stream.scrollTop=stream.scrollHeight;
    },50);
  });
},
saveStreetViewKey:function(){
  var i=document.getElementById('streetviewApiKey');
  if(!i){toast('API-key veld niet gevonden');return;}
  msfSetStreetViewApiKey(i.value);
  toast('StreetView API-key opgeslagen');
  render();
},
clearStreetViewKey:function(){
  msfSetStreetViewApiKey('');
  toast('StreetView API-key gewist; kaartbeeld fallback actief');
  render();
}
};

setTimeout(function(){byId('splash').style.display='none';var last=load('last_user',null);if(last){S.user=person(last);render()}else renderLogin()},400);
})();
