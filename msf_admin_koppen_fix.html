/* v23 fixes: compact beheer, project detail, remembered login, better maps */
.admin-compact{padding-top:22px;padding-bottom:18px}
.admin-compact .hero{margin-bottom:12px}
.admin-compact .hero h2{font-size:28px}
.admin-compact .admin-tabs{margin-bottom:14px}
.admin-compact .admin-grid{grid-template-columns:320px minmax(620px,1fr) 280px;gap:12px}
.admin-compact .admin-box{padding:14px}
.admin-compact .admin-box h3{margin-bottom:10px;font-size:17px}
.admin-compact .quick{padding:10px 6px}
.admin-compact .quick strong{font-size:22px;margin:4px 0}
.admin-compact .line{padding:6px 0}
.admin-compact .activity{padding:7px 0;font-size:12px}
.admin-compact .admin-table th,.admin-compact .admin-table td{padding:8px 9px;font-size:12px}
.admin-compact .bubble{width:34px;height:34px;font-size:12px}
.admin-compact .action-list button{padding:10px 6px;font-size:12px}
.admin-compact .role-line{padding:8px 0;font-size:12px}
.project-detail-grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(380px,.85fr);gap:20px;align-items:start}
.detail-hero-card{padding:24px;overflow:hidden}.detail-hero-card img{width:100%;height:260px;object-fit:cover;border-radius:14px;border:1px solid var(--line);background:#eef3fb}.streetview-preview{width:100%;height:300px;border-radius:14px;border:1px solid var(--line);background:#eef3fb;overflow:hidden;position:relative}.streetview-preview iframe{width:100%;height:100%;border:0;display:block}.streetview-badge{position:absolute;left:12px;bottom:12px;background:rgba(6,31,71,.88);color:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:800;z-index:2;box-shadow:0 8px 18px rgba(0,0,0,.18)}.detail-title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin:18px 0 8px}.detail-title-row h3{font-size:28px;margin:0}.detail-meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px}.detail-meta{background:#f6f9fd;border:1px solid #e2e9f4;border-radius:12px;padding:14px}.detail-meta small{display:block;color:var(--muted);font-weight:800;margin-bottom:4px}.detail-map{height:360px;border-radius:18px;overflow:hidden}.detail-side{display:flex;flex-direction:column;gap:16px}.compact-page{min-height:calc(100vh - 160px);overflow:auto}.remember-row{display:flex;align-items:center;gap:8px;margin-top:10px;color:#dbe8f8;font-size:13px}.remember-row input{width:16px!important;height:16px!important;margin:0!important}.project-row{cursor:pointer}.map-status{padding:10px 12px;border-radius:10px;background:#eef8f0;color:#13753a;font-weight:800;margin-top:10px}.map-status.warn{background:#fff7df;color:#8a5c00}

.notif-panel{position:absolute;right:0;top:52px;width:290px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);border:1px solid #D0D8E8;z-index:500;overflow:hidden}
.notif-head{padding:11px 15px;border-bottom:1px solid #EEF1F8;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:#1B2B4B}

.notif-item{padding:9px 15px;border-bottom:1px solid #EEF1F8}

.notif-item.unread .notif-msg{font-weight:600}
.notif-time{font-size:10px;color:#6B7A99;margin-top:2px}
.notif-empty{padding:14px;text-align:center;color:#6B7A99;font-size:12px}
.notif-btn-wrap{position:relative}
.team-row{cursor:pointer}.team-row:hover{background:#F5F7FB}

body.has-modal .leaflet-container{z-index:0!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* zichtbare boven-scrollbar voor planning */
#planTopScroll::-webkit-scrollbar{height:16px!important}
#planTopScroll::-webkit-scrollbar-track{background:#e6edf7;border-radius:999px}
#planTopScroll::-webkit-scrollbar-thumb{background:#123d72;border-radius:999px;border:3px solid #e6edf7}
#planTopRange{display:block!important}
#planTopRange:disabled{cursor:not-allowed}

/* verticale taken-scroll binnen balkenplanning */
#planBodyScroll{max-height:calc(100vh - 355px)!important;overflow:auto!important;scrollbar-width:auto;overscroll-behavior:contain}

function syncDown(showLoader){
  return Promise.all([
    sbGet('projecten','order=aangemaakt_op.desc').catch(function(){return null;}),
    sbGet('taken','order=aangemaakt_op.asc').catch(function(){return null;})
  ]).then(function(results){
    var projs=results[0],tasks=results[1];
    if(projs&&Array.isArray(projs)&&projs.length>=0){
      PROJECTS=projs.map(mapProject);window.PROJECTS=PROJECTS;
      saveProjects(null);
    }
    if(tasks&&Array.isArray(tasks)&&tasks.length>=0){
      TASKS=tasks.map(mapTask);window.TASKS=TASKS;
      saveTasks(null);
    }
    if(showLoader!==false)render();
    return {projects:PROJECTS,tasks:TASKS};
  }).catch(function(e){console.warn('Sync mislukt:',e);});
}

function latLonToTile(lat,lon,zoom){
  var n=Math.pow(2,zoom);
  var x=Math.floor((lon+180)/360*n);
  var latR=lat*Math.PI/180;
  var y=Math.floor((1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n);
  return {x:x,y:y,z:zoom};
}

function parsePdokPoint(wkt){
  var m=String(wkt||'').match(/POINT\(([-0-9.]+)\s+([-0-9.]+)\)/i);
  if(!m)return null;
  return {lon:parseFloat(m[1]),lat:parseFloat(m[2])};
}
function geocodeProject(p,cb){
  var q=fullAddress(p);
  var ak=addressKey(p);
  if(!q){if(cb)cb(null);return;}
  if(p&&p.lat&&p.lon&&p.geo_key===ak){if(cb)cb({lat:Number(p.lat),lon:Number(p.lon),source:'cache-project'});return;}
  var key='geo_pdok_v3_'+ak;
  var cached=load(key,null);
  if(cached&&cached.lat&&cached.lon){p.lat=cached.lat;p.lon=cached.lon;p.geo_key=ak;if(cb)cb(cached);return;}
  var pdok='https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?rows=1&fq=type:adres&q='+encodeURIComponent(q);
  fetch(pdok,{headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(d){
    var doc=d&&d.response&&d.response.docs&&d.response.docs[0];
    var c=parsePdokPoint(doc&&doc.centroide_ll);
    if(c&&isFinite(c.lat)&&isFinite(c.lon)){
      p.lat=c.lat;p.lon=c.lon;p.geo_key=ak;save(key,{lat:c.lat,lon:c.lon,source:'pdok'});save('msf_projects_v23',PROJECTS);
      if(cb)cb({lat:c.lat,lon:c.lon,source:'pdok'});return;
    }
    var nom='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=nl&q='+encodeURIComponent(q);
    return fetch(nom,{headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(n){
      if(n&&n[0]){var cc={lat:parseFloat(n[0].lat),lon:parseFloat(n[0].lon),source:'nominatim'};p.lat=cc.lat;p.lon=cc.lon;p.geo_key=ak;save(key,cc);save('msf_projects_v23',PROJECTS);if(cb)cb(cc);}else if(cb)cb(null);
    });
  }).catch(function(){if(cb)cb(null);});
}

function bell(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [1047,1319,1568].forEach(function(f,i){
      var o=ctx.createOscillator(),gn=ctx.createGain();
      o.connect(gn);gn.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      var t=ctx.currentTime+i*0.12;
      gn.gain.setValueAtTime(0,t);
      gn.gain.linearRampToValueAtTime(0.2,t+0.02);
      gn.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t);o.stop(t+0.4);
    });
  }catch(e){}
}

function sendChatMsg(text,imgData){
  if(!text&&!imgData)return;
  var data={gebruiker_id:S.user.id,tekst:text||'',tijd:new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})};
  if(imgData)data.afbeelding=imgData;
  sbPost('teamchat',data).then(function(){
    loadChat().then(function(){
      if(S.page==='chat'){render();scrollChatBottom();}
    });
    addNotif(S.user.name.split(' ')[0]+' stuurde een bericht in teamchat',false);
  }).catch(function(){toast('Bericht niet verzonden');});
}

function deleteChatMsg(id){
  if(!confirm('Bericht verwijderen?'))return;
  sbDel('teamchat',id).then(function(){
    loadChat().then(function(){if(S.page==='chat')render();});
  });
}

window.sendChatMsg=sendChatMsg;
window.deleteChatMsg=deleteChatMsg;
window.loadChat=loadChat;

function scrollChatBottom(){
  setTimeout(function(){
    var el=document.getElementById('chat-bottom');
    if(el)el.scrollIntoView({behavior:'smooth'});
  },80);
}


function localProjectChat(projectId){
  var all=load('msf_project_chat_v1',{});
  var arr=all&&all[projectId]?all[projectId]:[];
  return Array.isArray(arr)?arr:[];
}
function saveLocalProjectChat(projectId,arr){
  var all=load('msf_project_chat_v1',{});
  all[projectId]=arr||[];
  save('msf_project_chat_v1',all);
}
function normalizeProjectChatMsg(m,projectId){
  return {id:m.id||m.local_id||Date.now(),project_id:m.project_id||m.projectId||projectId,user:m.gebruiker_id||m.user||m.userId||m.gebruiker||null,text:m.tekst||m.text||'',img:m.afbeelding||m.img||null,time:m.tijd||m.time||''};
}
function loadProjectChat(projectId){
  projectId=parseInt(projectId,10);
  if(!projectId)return Promise.resolve([]);
  var local=localProjectChat(projectId).map(function(m){return normalizeProjectChatMsg(m,projectId);});
  return sbGet('teamchat','project_id=eq.'+projectId+'&order=aangemaakt_op.asc&limit=100').then(function(d){
    var remote=Array.isArray(d)?d.map(function(m){return normalizeProjectChatMsg(m,projectId);}):[];
    var seen={};remote.forEach(function(m){seen[String(m.id)]=true;});local.forEach(function(m){if(!seen[String(m.id)])remote.push(m);});
    S.projectChatMsgs[projectId]=remote;return remote;
  }).catch(function(){S.projectChatMsgs[projectId]=local;return local;});
}
function sendProjectChatMsg(projectId,text,imgData){
  projectId=parseInt(projectId,10);text=String(text||'').trim();if(!projectId||(!text&&!imgData))return;
  var msg={id:Date.now(),project_id:projectId,user:S.user.id,text:text,img:imgData||null,time:new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})};
  var local=localProjectChat(projectId);local.push(msg);saveLocalProjectChat(projectId,local);
  S.projectChatMsgs[projectId]=(S.projectChatMsgs[projectId]||[]).concat([msg]);render();setTimeout(scrollProjectChatBottom,80);
  var data={gebruiker_id:S.user.id,tekst:text||'',tijd:msg.time,project_id:projectId};if(imgData)data.afbeelding=imgData;
  sbPost('teamchat',data).then(function(res){
    if(res&&res[0]&&res[0].id){var all=localProjectChat(projectId);all=all.map(function(x){if(x.id===msg.id)x.id=res[0].id;return x;});saveLocalProjectChat(projectId,all);} 
    loadProjectChat(projectId).then(function(){if(S.page==='project'&&S.projectId==projectId){render();setTimeout(scrollProjectChatBottom,80);}});
  }).catch(function(){toast('Projectchat lokaal opgeslagen');});
}
function deleteProjectChatMsg(projectId,id){
  if(!confirm('Bericht verwijderen?'))return;projectId=parseInt(projectId,10);
  var arr=localProjectChat(projectId).filter(function(m){return String(m.id)!==String(id);});saveLocalProjectChat(projectId,arr);
  S.projectChatMsgs[projectId]=(S.projectChatMsgs[projectId]||[]).filter(function(m){return String(m.id)!==String(id);});
  sbDel('teamchat',id).catch(function(){});render();
}

function defaultUurtarief(){var v=parseFloat(load('msf_default_uurtarief',70));return isFinite(v)&&v>0?v:70;}
function localUren(){var arr=load('msf_uren_v1',[]);return Array.isArray(arr)?arr:[];}
function saveLocalUren(arr){save('msf_uren_v1',arr||[]);}
function normalizeUren(u){return{
  id:u.id||Date.now(),
  userId:u.gebruiker_id||u.userId||u.user_id||S.user.id,
  projectId:u.project_id||u.projectId||null,
  datum:u.datum||'',
  uren:parseFloat(String(u.uren||0).replace(',','.'))||0,
  tarief:parseFloat(String(u.tarief||u.uurtarief||u.hourly_rate||defaultUurtarief()).replace(',','.'))||defaultUurtarief(),
  omschrijving:u.omschrijving||u.description||''
};}
function loadUren(){
  var uid=S.user.id;
  var query=(S.user.admin||S.user.id===7)
    ?'order=datum.desc&limit=500'
    :'gebruiker_id=eq.'+uid+'&order=datum.desc&limit=500';
  return sbGet('uren',query).then(function(d){
    if(Array.isArray(d)){
      S.urenList=d.map(normalizeUren);
      var local=localUren();
      if(local.length){
        var seen={};S.urenList.forEach(function(u){seen[String(u.id)]=true;});
        local.forEach(function(u){if(!seen[String(u.id)])S.urenList.push(normalizeUren(u));});
      }
    }
  }).catch(function(){
    S.urenList=localUren().map(normalizeUren).filter(function(u){return (S.user.admin||S.user.id===7)||u.userId===uid;});
  });
}
function urenBedrag(u){return (parseFloat(u.uren)||0)*(parseFloat(u.tarief)||defaultUurtarief());}
function money(n){return '€ '+(Math.round((parseFloat(n)||0)*100)/100).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});}

function syncPlanScroll(){
  var top=byId('planTopScroll');
  var inner=byId('planTopScrollInner');
  var body=byId('planBodyScroll');
  var range=byId('planTopRange');
  if(!top||!inner||!body)return;

  function measure(){
    var w=Math.max(body.scrollWidth, body.clientWidth+1);
    inner.style.width=w+'px';
    inner.style.height='20px';
    top.style.overflowX='scroll';
    top.style.overflowY='hidden';
    if(range){
      var max=Math.max(0, body.scrollWidth-body.clientWidth);
      range.max=String(max);
      range.value=String(Math.min(body.scrollLeft,max));
      range.disabled=max<=0;
      range.style.opacity=max<=0 ? '.45' : '1';
    }
  }
  measure();
  setTimeout(measure,80);
  setTimeout(measure,250);

  if(top.dataset.bound==='1')return;
  top.dataset.bound='1';
  var lock=false;
  top.addEventListener('scroll',function(){
    if(lock)return;lock=true;
    body.scrollLeft=top.scrollLeft;
    if(range)range.value=String(body.scrollLeft);
    lock=false;
  });
  body.addEventListener('scroll',function(){
    if(lock)return;lock=true;
    top.scrollLeft=body.scrollLeft;
    if(range)range.value=String(body.scrollLeft);
    lock=false;
  });
  if(range){
    range.addEventListener('input',function(){
      body.scrollLeft=parseInt(range.value||'0',10);
      top.scrollLeft=body.scrollLeft;
    });
  }
  top.scrollLeft=body.scrollLeft;
}

function weekNumber(d){
  if(!d)return '';
  var date=new Date(d+'T12:00:00');
  if(isNaN(date.getTime()))return '';
  date.setDate(date.getDate()+4-(date.getDay()||7));
  var yearStart=new Date(date.getFullYear(),0,1);
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function tasksPage(){
  var ps=activeProjects();
  var current=project(S.taskProjectId||(ps[0]&&ps[0].id)||( activeProjects()[0]&&activeProjects()[0].id));
  if(!current)return '<main class="page"><p>Geen projecten gevonden.</p></main>';
  S.taskProjectId=current.id;
  var tasks=TASKS.filter(function(t){return t.project_id===current.id;});
  var done=tasks.filter(function(t){return t.status==='Voltooid';}).length;
  var busy=tasks.filter(function(t){return t.status==='In uitvoering';}).length;
  var todo=tasks.filter(function(t){return t.status==='Te doen';}).length;

  var html='<main class="page">';

  // Header
  html+='<div class="hero"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">';
  html+='<div><h2>&#9989; Taken</h2><p>Selecteer een project — bewerk of voeg taken toe</p></div>';
  html+='<button class="btn orange" onclick="MSF.openModal(\'task\')">&#43; Nieuwe taak</button>';
  html+='</div></div>';

  // Two-column layout: project list left, tasks right
  html+='<div style="display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start">';

  // Left: project list
  html+='<div class="card" style="padding:0;overflow:hidden">';
  html+='<div style="padding:12px 16px;border-bottom:1px solid #EEF1F8;font-weight:700;font-size:14px;color:#1B2B4B">Projecten</div>';
  ps.forEach(function(p){
    var active=(p.id===current.id);
    var sc={Actief:'#1B3A6B',Gepland:'#f0a500',Afgerond:'#27ae60'}[p.status]||'#9ca3af';
    var ptasks=TASKS.filter(function(t){return t.project_id===p.id;});
    var pdone=ptasks.filter(function(t){return t.status==='Voltooid';}).length;
    html+='<div onclick="MSF.selectTaskProject('+p.id+')" style="padding:12px 14px;border-bottom:1px solid #EEF1F8;cursor:pointer;background:'+(active?'#EEF4FF':'#fff')+';border-left:3px solid '+(active?sc:'transparent')+'">';
    html+='<div style="font-size:13px;font-weight:700;color:#1B2B4B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">';
    html+='<span style="font-size:11px;color:#6B7A99">'+esc(p.city||p.address||'')+'</span>';
    html+='<span style="font-size:11px;font-weight:700;color:'+sc+'">'+pdone+'/'+ptasks.length+'</span>';
    html+='</div></div>';
  });
  html+='</div>';

  // Right: task list
  html+='<div>';
  // Stats bar
  html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  html+='<div style="background:#fff;border:1px solid #D0D8E8;border-radius:9px;padding:9px 16px;font-size:13px"><span style="font-weight:700;color:#1B2B4B">'+tasks.length+'</span> <span style="color:#6B7A99">totaal</span></div>';
  html+='<div style="background:#fff;border:1px solid #D0D8E8;border-radius:9px;padding:9px 16px;font-size:13px"><span style="font-weight:700;color:#27ae60">'+done+'</span> <span style="color:#6B7A99">voltooid</span></div>';
  html+='<div style="background:#fff;border:1px solid #D0D8E8;border-radius:9px;padding:9px 16px;font-size:13px"><span style="font-weight:700;color:#1B3A6B">'+busy+'</span> <span style="color:#6B7A99">in uitvoering</span></div>';
  html+='<div style="background:#fff;border:1px solid #D0D8E8;border-radius:9px;padding:9px 16px;font-size:13px"><span style="font-weight:700;color:#f0a500">'+todo+'</span> <span style="color:#6B7A99">te doen</span></div>';
  html+='</div>';

  if(!tasks.length){
    html+='<div class="card" style="padding:32px;text-align:center;color:#6B7A99">';
    html+='<div style="font-size:36px;margin-bottom:10px">&#128203;</div>';
    html+='<div style="font-weight:700;margin-bottom:8px">Geen taken voor dit project</div>';
    html+='<button class="btn orange" onclick="MSF.openModal(\'task\')">&#43; Eerste taak toevoegen</button>';
    html+='</div>';
  } else {
    html+='<div class="card" style="padding:0;overflow:hidden">';
    tasks.forEach(function(t,i){
      var m=person(t.assignee);
      var isDone=(t.status==='Voltooid');
      var isBusy=(t.status==='In uitvoering');
      var sc=isDone?'#27ae60':isBusy?'#1B3A6B':'#f0a500';
      var border=(i<tasks.length-1)?'border-bottom:1px solid #EEF1F8;':'';
      html+='<div style="'+border+'padding:13px 16px;display:flex;align-items:center;gap:12px;background:'+(isDone?'#f9fafb':'#fff')+'">';
      // Checkbox
      html+='<div onclick="MSF.toggleTask('+t.id+','+isDone+')" style="width:22px;height:22px;border-radius:6px;border:2px solid '+(isDone?'#27ae60':'#D0D8E8')+';background:'+(isDone?'#27ae60':'#fff')+';display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">';
      if(isDone)html+='<span style="color:#fff;font-size:13px;font-weight:900">&#10003;</span>';
      html+='</div>';
      // Title + meta
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-size:14px;font-weight:'+(isDone?400:600)+';color:'+(isDone?'#9ca3af':'#1B2B4B')+';text-decoration:'+(isDone?'line-through':'none')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div>';
      html+='<div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">';
      if(t.deadline)html+='<span style="font-size:11px;color:#6B7A99">&#128197; '+fmt(t.deadline)+'</span>';
      html+='<span style="font-size:11px;color:#6B7A99">&#128119; '+esc(m.name)+'</span>';
      if(t.priority==='Hoog')html+='<span style="font-size:11px;background:#fef2f2;color:#991b1b;padding:1px 6px;border-radius:4px;font-weight:600">Hoog</span>';
      html+='</div></div>';
      // Status pill
      html+='<span style="font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;background:'+sc+'18;color:'+sc+';white-space:nowrap">'+esc(t.status)+'</span>';
      // Avatar
      html+='<div style="width:28px;height:28px;border-radius:50%;background:'+m.color+';color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0" title="'+esc(m.name)+'">'+m.av+'</div>';
      // Edit button - always visible
      html+='<button onclick="MSF.editTask('+t.id+')" style="flex-shrink:0;padding:5px 12px;border-radius:8px;border:1.5px solid #D0D8E8;background:#fff;cursor:pointer;font-size:13px;color:#1B2B4B;font-family:inherit" title="Bewerken">&#9998;</button>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div></div></main>';
  return html;
}

function planningPage(){
  var mode=S.planMode||'week';
  if(!S.planCollapsed)S.planCollapsed={};
  if(typeof S.planOffset!=='number')S.planOffset=0;
  if(typeof S.showWeekends==='undefined')S.showWeekends=true;
  var vacations=load('msf_plan_vacations_v1',[]);

  function parseDate(d){return d?new Date(d+'T00:00:00'):null;}
  function addDays(dt,n){var x=new Date(dt);x.setDate(x.getDate()+n);return x;}
  function dateKey(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
  function fmtShort(dt){return String(dt.getDate()).padStart(2,'0')+'-'+String(dt.getMonth()+1).padStart(2,'0');}
  function dayName(dt){return ['Zo','Ma','Di','Wo','Do','Vr','Za'][dt.getDay()];}
  function monthName(m){return ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][m];}
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
  function daysBetween(a,b){return Math.round((a-b)/86400000);}
  function isoWeek(dt){var d=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));var day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);var y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7);}
  function isoWeekYear(dt){var d=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));var day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);return d.getUTCFullYear();}
  function sameDay(a,b){return dateKey(a)===dateKey(b);}

  var now=new Date();
  var start, label;
  if(mode==='week'){
    var mon=addDays(now,-((now.getDay()+6)%7));
    start=addDays(mon,S.planOffset*7);
    label='Week '+isoWeek(start)+' · '+fmtShort(start)+' t/m '+fmtShort(addDays(start,6));
  } else if(mode==='month'){
    start=new Date(now.getFullYear(),now.getMonth()+S.planOffset,1);
    label=monthName(start.getMonth())+' '+start.getFullYear();
  } else if(mode==='quarter'){
    var q0=Math.floor(now.getMonth()/3)*3 + S.planOffset*3;
    start=new Date(now.getFullYear(),q0,1);
    label='Kwartaal '+(Math.floor(start.getMonth()/3)+1)+' · '+start.getFullYear();
  } else {
    start=new Date(now.getFullYear()+S.planOffset,0,1);
    label='Jaar '+start.getFullYear();
  }
  var rangeEnd;
  if(mode==='week')rangeEnd=addDays(start,6);
  else if(mode==='month')rangeEnd=addDays(new Date(start.getFullYear(),start.getMonth()+1,1),-1);
  else if(mode==='quarter')rangeEnd=addDays(new Date(start.getFullYear(),start.getMonth()+3,1),-1);
  else rangeEnd=new Date(start.getFullYear(),11,31);

  var timeline=[];
  for(var d=new Date(start);d<=rangeEnd;d=addDays(d,1)){
    if(S.showWeekends || (d.getDay()!==0&&d.getDay()!==6))timeline.push(new Date(d));
  }
  var days=timeline.length||1;
  var cellW={week:112,month:48,quarter:28,year:18}[mode]||44;
  var leftW=410;
  function taskStart(t,p){return parseDate(t.start)||parseDate(t.start_date)||parseDate(t.begindatum)||parseDate(t.deadline)||parseDate(p.start)||start;}
  function taskEnd(t,p){return parseDate(t.end)||parseDate(t.end_date)||parseDate(t.einddatum)||parseDate(t.deadline)||parseDate(p.end)||taskStart(t,p);}
  function statusColor(st){return st==='Voltooid'?'#27ae60':st==='In uitvoering'?'#0b5bd3':'#f0a500';}
  function safeColor(c, fallback){return /^#[0-9a-fA-F]{6}$/.test(String(c||''))?c:fallback;}
  function visibleIndex(dt){for(var i=0;i<timeline.length;i++){if(timeline[i]>=dt)return i;}return timeline.length-1;}
  function lastVisibleIndex(dt){for(var i=timeline.length-1;i>=0;i--){if(timeline[i]<=dt)return i;}return 0;}
  function isVisible(s,e){return e>=start&&s<=rangeEnd;}
  function projectTasks(pid){return TASKS.filter(function(t){return t.project_id===pid;});}
  function isVacationDate(dt){var yw=isoWeekYear(dt)+'-'+String(isoWeek(dt)).padStart(2,'0');return vacations.some(function(v){return v.week===yw;});}
  function vacationText(dt){var yw=isoWeekYear(dt)+'-'+String(isoWeek(dt)).padStart(2,'0');var items=vacations.filter(function(v){return v.week===yw;});return items.map(function(v){return v.name||'Vakantie';}).join(', ');}
  function colBg(dt){var weekend=dt.getDay()===0||dt.getDay()===6;var vac=isVacationDate(dt);var today=sameDay(dt,now);return today?'#dbeafe':vac?'#fff1cf':weekend?'#f3f4f6':'#fff';}
  function leftLabelDate(dt){return dayName(dt)+' '+fmtShort(dt);}

  var html='<main class="page">';
  html+='<div class="hero"><div><h2>📊 Balkenplanning</h2><p>Week-, maand-, kwartaal- en jaarplanning met dagkolommen, weeknummers, vakantieweken en versleepbare planitems.</p></div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
  ['week','month','quarter','year'].forEach(function(m){html+='<button class="btn '+(mode===m?'orange':'light')+'" onclick="MSF.setPlanMode(\''+m+'\')">'+({week:'Week',month:'Maand',quarter:'Kwartaal',year:'Jaar'})[m]+'</button>';});
  html+='<button class="btn light" onclick="MSF.shiftPlan(-1)">← Vorige</button><button class="btn light" onclick="MSF.shiftPlan(1)">Volgende →</button><button class="btn light" onclick="MSF.resetPlanPeriod()">Vandaag</button>';
  html+='<button class="btn '+(S.showWeekends?'orange':'light')+'" onclick="MSF.toggleWeekends()">Za/zo '+(S.showWeekends?'aan':'uit')+'</button>';
  html+='<button class="btn light" onclick="MSF.addVacationWeek()">＋ Vakantieweek</button>';
  html+='<button class="btn light" onclick="MSF.printAllProjectPlannings()">🖨 Alle projecten PDF</button>';
  html+='<button class="btn orange" onclick="S.planTaskProject=null;MSF.openModal(\'task\')">＋ Taak toevoegen</button>';
  html+='</div></div>';
  html+='<div class="card" style="padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><div><b>'+esc(label)+'</b><div style="font-size:12px;color:#6B7A99;margin-top:3px">Sleep het middenstuk om te verplaatsen. Sleep ◀ of ▶ om start/einddatum te wijzigen. Scroll verticaal in het planningsvak om door taken te lopen. Kleur via ✎.</div></div>';
  html+='<div style="font-size:12px;color:#6B7A99">Legenda: <span style="background:#fff1cf;padding:3px 7px;border-radius:6px">vakantie</span> <span style="background:#f3f4f6;padding:3px 7px;border-radius:6px">weekend</span> <span style="background:#dbeafe;padding:3px 7px;border-radius:6px">vandaag</span></div></div>';
  if(vacations.length){html+='<div class="card" style="padding:10px 14px;margin-bottom:14px"><b style="font-size:13px">Geplande vakantieweken</b><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">';vacations.forEach(function(v,i){html+='<span style="background:#fff1cf;border:1px solid #f6d365;border-radius:999px;padding:5px 9px;font-size:12px">Week '+esc(v.week)+' · '+esc(v.name||'Vakantie')+' <button onclick="MSF.removeVacationWeek('+i+')" style="border:0;background:transparent;color:#8a5c00;font-weight:900;cursor:pointer">×</button></span>';});html+='</div></div>';}

  html+='<div style="position:sticky;top:160px;z-index:30;background:#f3f6fb;border:1px solid #D0D8E8;border-bottom:0;border-radius:14px 14px 0 0;padding:8px 10px 6px;margin:0">';
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><span style="font-size:12px;font-weight:800;color:#123d72;white-space:nowrap">⇆ Planning scroll</span><input id="planTopRange" type="range" min="0" value="0" step="1" style="width:100%;accent-color:#123d72"></div>';
  html+='<div id="planTopScroll" style="overflow-x:scroll!important;overflow-y:hidden;height:22px;background:#fff;border:1px solid #D0D8E8;border-radius:8px;scrollbar-width:auto"><div id="planTopScrollInner" style="height:20px;width:'+(leftW+days*cellW)+'px"></div></div></div>';
  html+='<div id="planBodyScroll" class="card" style="overflow:auto!important;max-height:calc(100vh - 355px);padding:0;border-top-left-radius:0;border-top-right-radius:0">';
  html+='<div style="display:grid;grid-template-columns:'+leftW+'px repeat('+days+', '+cellW+'px);min-width:'+(leftW+days*cellW)+'px">';

  html+='<div style="position:sticky;left:0;top:0;background:#fff;border-right:1px solid #D0D8E8;padding:8px 12px;font-weight:800;z-index:25">Projecten / planitems</div>';
  timeline.forEach(function(dt,idx){
    var showWeek=idx===0 || isoWeek(timeline[idx-1])!==isoWeek(dt);
    html+='<div style="position:sticky;top:0;height:30px;padding:4px 1px;font-size:10px;text-align:center;border-left:1px solid #EEF1F8;background:#F8FAFC;color:#52627f;font-weight:800;z-index:20">'+(showWeek?'W'+isoWeek(dt):'')+'</div>';
  });
  html+='<div style="position:sticky;left:0;top:30px;background:#fff;border-right:1px solid #D0D8E8;border-top:1px solid #EEF1F8;padding:8px 12px;font-weight:700;z-index:24;color:#6B7A99">Dagen</div>';
  timeline.forEach(function(dt){
    var label2=(mode==='year'&&dt.getDate()!==1)?dayName(dt):leftLabelDate(dt);
    var title=vacationText(dt);
    html+='<div data-date="'+dateKey(dt)+'" title="'+esc(title)+'" style="position:sticky;top:30px;height:42px;padding:5px 1px;font-size:10px;text-align:center;border-left:1px solid #EEF1F8;border-top:1px solid #EEF1F8;background:'+colBg(dt)+';color:#52627f;font-weight:'+(sameDay(dt,now)?'900':'700')+';z-index:19"><div>'+esc(label2)+'</div><div style="font-size:9px;color:#8a94a8">'+(mode==='year'&&dt.getDate()===1?monthName(dt.getMonth()):'')+'</div></div>';
  });

  PROJECTS.forEach(function(p){
    var pTasks=projectTasks(p.id);
    var collapsed=!!S.planCollapsed[p.id];
    var pStart=parseDate(p.start)||start;
    var pEnd=parseDate(p.end)||addDays(pStart,Math.max(6,pTasks.length*2));
    if(pEnd<pStart)pEnd=pStart;
    var pVisible=isVisible(pStart,pEnd);
    var pOffset=visibleIndex(pStart);
    var pLast=lastVisibleIndex(pEnd);
    var pSpan=clamp(pLast-pOffset+1,1,days-pOffset);
    var pColor=p.status==='Afgerond'?'#27ae60':p.status==='Gepland'?'#f0a500':'#123d72';

    html+='<div style="position:sticky;left:0;background:#eef4ff;border-top:1px solid #D0D8E8;border-right:1px solid #D0D8E8;padding:10px;z-index:4">';

    html+='<button onclick="MSF.togglePlanProject('+p.id+')" style="width:28px;height:28px;border-radius:7px;border:1px solid #c7d4ea;background:#fff;color:#123d72;font-weight:900;cursor:pointer">'+(collapsed?'＋':'−')+'</button>';
    html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:800;color:#1B2B4B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div><div style="font-size:11px;color:#6B7A99">'+esc(fmt(p.start)||'geen start')+' t/m '+esc(fmt(p.end)||'geen einde')+' · '+pTasks.length+' taak/taken</div></div>';
    html+='<button onclick="event.stopPropagation();MSF.printProjectPlanning('+p.id+')" style="border:1px solid #bdd0ed;background:#fff;color:#123d72;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:800;cursor:pointer">🖨 PDF</button>';
    html+='<button onclick="event.stopPropagation();S.planTaskProject='+p.id+';MSF.openModal(\'task\')" style="border:1px solid #bdd0ed;background:#fff;color:#0b5bd3;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:800;cursor:pointer">＋ Taak</button>';
    html+='</div></div>';
    timeline.forEach(function(dt,di){
      html+='<div style="height:50px;border-top:1px solid #D0D8E8;border-left:1px solid #EEF1F8;position:relative;background:'+colBg(dt)+'">';

      html+='</div>';
    });

    if(!collapsed){
      if(!pTasks.length){
        html+='<div style="position:sticky;left:0;background:#fff;border-top:1px solid #EEF1F8;border-right:1px solid #D0D8E8;padding:10px 10px 10px 46px;z-index:3;color:#9ca3af;font-size:12px">Nog geen taken. Dit project is wel planbaar: klik op + Taak.</div>';
        timeline.forEach(function(dt){html+='<div ondragover="event.preventDefault();this.style.background=\'#e0f2fe\'" ondragleave="this.style.background=\''+colBg(dt)+'\'" style="height:42px;border-top:1px solid #EEF1F8;border-left:1px solid #F3F4F6;background:'+colBg(dt)+'"></div>';});
      }
      pTasks.forEach(function(t){
        var s=taskStart(t,p), e=taskEnd(t,p); if(e<s)e=s;

        var last=lastVisibleIndex(e);
        var span=clamp(last-offset+1,1,days-offset);
        var c=safeColor(t.color,statusColor(t.status));
        html+='<div style="position:sticky;left:0;background:#fff;border-top:1px solid #EEF1F8;border-right:1px solid #D0D8E8;padding:8px 10px 8px 46px;z-index:3">';
        html+='<div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:'+c+';flex:0 0 auto"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:#1B2B4B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div><div style="font-size:10px;color:#6B7A99">'+esc(fmt(dateKey(s)))+' t/m '+esc(fmt(dateKey(e)))+'</div></div>';
        html+='<button onclick="MSF.editTask('+t.id+')" style="border:1px solid #D0D8E8;background:#fff;border-radius:7px;padding:4px 8px;cursor:pointer">✎</button>';
        html+='<button onclick="MSF.deleteTask('+t.id+')" style="border:1px solid #ffcaca;background:#fff5f5;color:#ef4444;border-radius:7px;padding:4px 8px;cursor:pointer">🗑</button></div></div>';
        timeline.forEach(function(dt,td){
          var dropDate=dateKey(dt);
          html+='<div ondragover="event.preventDefault();this.style.background=\'#e0f2fe\'" ondragleave="this.style.background=\''+colBg(dt)+'\'" ondrop="event.preventDefault();this.style.background=\''+colBg(dt)+'\';MSF.handlePlanDrop(event,'+t.id+',\''+dropDate+'\')" style="height:48px;border-top:1px solid #EEF1F8;border-left:1px solid #F3F4F6;position:relative;background:'+colBg(dt)+'">';
          if(visible&&td===offset){
            html+='<div draggable="true" ondragstart="MSF.startPlanDrag(event,'+t.id+',\'move\')" title="Sleep middenstuk om de taak te verplaatsen" style="position:absolute;left:2px;width:'+(span*cellW-4)+'px;top:8px;height:32px;border-radius:9px;background:'+c+';color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;overflow:hidden;white-space:nowrap;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2">';
            html+='<span draggable="true" ondragstart="event.stopPropagation();MSF.startPlanDrag(event,'+t.id+',\'resize-start\')" title="Sleep om startdatum te wijzigen" style="width:15px;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.22);cursor:w-resize">◀</span>';
            html+='<span style="flex:1;padding:0 7px;overflow:hidden;text-overflow:ellipsis">↔ '+esc(t.title)+'</span>';
            html+='<span draggable="true" ondragstart="event.stopPropagation();MSF.startPlanDrag(event,'+t.id+',\'resize-end\')" title="Sleep om einddatum te wijzigen" style="width:15px;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.22);cursor:e-resize">▶</span>';
            html+='</div>';
          }
          html+='</div>';
        });
      });
    }
  });
  html+='</div></div></main>';
  return html;
}

    toast('Teamlid bijgewerkt');
    render();
  },
  adminDeleteMember:function(id){
    var m=TEAM.find(function(x){return x.id===id;});
    if(!m)return;
    if(id===S.user.id){toast('Je kunt jezelf niet verwijderen');return;}
    if(!confirm('Teamlid verwijderen: '+m.name+'?'))return;
    var idx=TEAM.findIndex(function(x){return x.id===id;});
    if(idx>=0)TEAM.splice(idx,1);
    PROJECTS.forEach(function(p){p.assignees=(p.assignees||[]).filter(function(a){return a!==id;});});
    TASKS.forEach(function(t){if(t.assignee===id)t.assignee=null;});
    toast('Teamlid verwijderd');
    render();
  },
  adminTemplate:function(type){
    var label=type==='project'?'projectsjabloon':'taaksjabloon';
    var name=prompt('Naam nieuw '+label,type==='project'?'Nieuw project sjabloon':'Nieuw taak sjabloon');
    if(!name){toast('Geen sjabloon aangemaakt');return;}
    var key=type==='project'?'msf_project_templates_v1':'msf_task_templates_v1';
    var list=load(key,[]);
    list.push({id:Date.now(),name:name,created:new Date().toISOString().slice(0,10),by:S.user&&S.user.name});
    save(key,list);
    toast(label.charAt(0).toUpperCase()+label.slice(1)+' opgeslagen');
  },
  adminBackup:function(){
    var data={created:new Date().toISOString(),projects:PROJECTS,tasks:TASKS,team:TEAM,settings:{defaultRate:load('msf_default_uurtarief',70)}};
    try{
      var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;
      a.download='msf_backup_'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){URL.revokeObjectURL(url);a.remove();},100);
      toast('Back-up gedownload');
    }catch(e){toast('Back-up kon niet worden gemaakt');}
  }
});

setTimeout(function(){
  // Check for klant link
  var klantToken=null;
  try{
    if(window.location.search){
      var urlParams=new URLSearchParams(window.location.search);
      klantToken=urlParams.get('klant');
    }
  }catch(e){
    // Fallback for older browsers
    var qs=window.location.search.slice(1);
    var pairs=qs.split('&');
    for(var qi=0;qi<pairs.length;qi++){
      var kv=pairs[qi].split('=');
      if(kv[0]==='klant'){klantToken=decodeURIComponent(kv[1]||'');break;}
    }
  }
  if(klantToken){klantPage(klantToken);return;}
  document.getElementById('splash').style.display='none';
  var last=load('msf_last_user',null);
  var u=last?person(last):null;
  if(u){
    S.user=u;
    render(); // show immediately from localStorage
    syncDown(false).then(function(){render();}).catch(function(){});
    startPolling();
  } else {
    renderLogin();
  }
},450);
})();

</script>
